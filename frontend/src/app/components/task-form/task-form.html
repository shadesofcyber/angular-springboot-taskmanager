<div class="max-w-100 my-8 bg-white p-5 border-t border-t-custom-border">
  <h2 class="mb-4 text-lg font-semibold text-center">Create Task</h2>

  <form (submit)="$event.preventDefault(); submitForm()" class="space-y-4">
    <input
      class="outline-none hover:bg-primary-light transition-all duration-300 w-full rounded-lg border border-gray-200 px-4 py-2"
      placeholder="Title"
      [value]="title()"
      (input)="title.set($any($event.target).value)"
    />
    @if (titleError()) {
      <p class="-mt-3 text-xs text-red-500">
        {{ titleError() }}
      </p>
    }

    <textarea
      class="resize-none outline-none hover:bg-primary-light transition-all duration-300 w-full rounded-lg border border-gray-200 px-4 py-2"
      placeholder="Description"
      [value]="description()"
      (input)="description.set($any($event.target).value)"
    ></textarea>
    @if (descriptionError()) {
      <p class="-mt-3 text-xs text-red-500">
        {{ descriptionError() }}
      </p>
    }

    <div class="grid gap-4 md:grid-cols-2">
      <select
        class="w-full rounded-lg border border-gray-200 px-4 py-2"
        [value]="status()"
        (change)="status.set($any($event.target).value)"
      >
        <option value="TODO">To Do</option>
        <option value="IN_PROGRESS">In Progress</option>
        <option value="COMPLETED">Completed</option>
      </select>

      <select
        class="w-full rounded-lg border border-gray-200 px-4 py-2"
        [value]="priority()"
        (change)="priority.set($any($event.target).value)"
      >
        <option value="LOW">Low</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
      </select>
    </div>
    <div class="w-full flex items-center justify-center">
      <button
        type="submit"
        class="flex items-center gap-2 justify-between tracking-wide cursor-pointer rounded-xl bg-primary px-10 py-3 text-lg font-medium text-white hover:bg-primary/90 transition-all duration-300 shadow"
      >
        <svg lucidePlus class="size-5" /> <span>New Task</span>
      </button>
    </div>
  </form>
</div>
